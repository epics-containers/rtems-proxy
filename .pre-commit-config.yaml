repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^uv.lock
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: ruff
        name: lint with ruff
        language: system
        entry: ruff check --force-exclude --fix
        types: [python]
        require_serial: true

      - id: ruff-format
        name: format with ruff
        language: system
        entry: ruff format --force-exclude
        types: [python]
        require_serial: true

      - id: uv-sync
        name: update uv.lock and venv
        pass_filenames: false
        language: system
        entry: uv sync
        files: ^(uv\.lock|pyproject\.toml)$

      # The hybrid e2e tests need DLS-internal GitLab (ibek-support-dls) and so
      # are SKIPPED on public CI -- run them locally for real coverage. verbose
      # makes pre-commit print this even though the hook always passes.
      - id: run-tests-locally
        name: reminder to run tests locally
        pass_filenames: false
        always_run: true
        verbose: true
        language: system
        entry: "bash -c 'echo \"NOTE: run the tests locally -- they are more informative than CI. The hybrid IOC tests need DLS GitLab access (ibek-support-dls) and are skipped on public CI. Run: uv run --group ci pytest\"'"

